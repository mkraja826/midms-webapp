# Triggered after workflow registration
name: One-time Add Visit web save fix

on:
  push:
    branches: [perf-realtime-safe-2026-07-17]
    paths:
      - .github/workflows/patch-add-visit-web-save.yml

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Apply focused Add Visit fix
        shell: python
        run: |
          from pathlib import Path

          path = Path("src/app/patient/visit.tsx")
          text = path.read_text(encoding="utf-8")

          replacements = [
              (
                  'import { Alert, Pressable, ScrollView, Text, TextInput, View } from "react-native";',
                  'import { Alert, Platform, Pressable, ScrollView, Text, TextInput, View } from "react-native";',
              ),
              (
                  '  const patientRequestRef = useRef(0);\n  const patientSearchMountedRef = useRef(false);',
                  '  const patientRequestRef = useRef(0);\n  const patientSearchMountedRef = useRef(false);\n  const saveVisitLockRef = useRef(false);',
              ),
              (
                  '  async function saveVisit(options?: { confirmedSeparateTreatment?: boolean; flow?: TreatmentFlow }) {\n    if (saving) return;',
                  '  async function saveVisit(options?: { confirmedSeparateTreatment?: boolean; flow?: TreatmentFlow }) {\n    if (saving || saveVisitLockRef.current) return;',
              ),
              (
                  '    setSaving(true);\n\n    try {',
                  '    saveVisitLockRef.current = true;\n    setSaving(true);\n\n    try {',
              ),
              (
                  '      await supabase.rpc("mark_patient_visit_completed", {\n        p_patient_id: selectedPatientId,\n      });\n\n      Alert.alert(',
                  '      await supabase.rpc("mark_patient_visit_completed", {\n        p_patient_id: selectedPatientId,\n      });\n\n      if (Platform.OS === "web") {\n        router.replace(`/patient/${selectedPatientId}` as never);\n        return;\n      }\n\n      Alert.alert(',
              ),
              (
                  '    } finally {\n      setSaving(false);\n    }',
                  '    } finally {\n      saveVisitLockRef.current = false;\n      setSaving(false);\n    }',
              ),
          ]

          for old, new in replacements:
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f"Expected one match, found {count}: {old[:100]!r}")
              text = text.replace(old, new, 1)

          path.write_text(text, encoding="utf-8")

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npm run typecheck

      - name: Remove one-time workflow and commit
        run: |
          rm .github/workflows/patch-add-visit-web-save.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/app/patient/visit.tsx .github/workflows/patch-add-visit-web-save.yml
          git commit -m "Fix Add Visit web success navigation and duplicate saves"
          git push origin HEAD:perf-realtime-safe-2026-07-17

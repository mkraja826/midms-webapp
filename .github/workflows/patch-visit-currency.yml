name: One-time Add Visit currency patch

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/patch-visit-currency.yml

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Apply focused currency patch
        shell: python
        run: |
          from pathlib import Path

          path = Path("src/app/patient/visit.tsx")
          text = path.read_text(encoding="utf-8")

          replacements = [
              (
                  'import { useAuth } from "@/lib/auth";\nimport { searchPatientsPage } from "@/lib/patientDirectory";',
                  'import { useAuth } from "@/lib/auth";\nimport {\n  formatClinicMoney,\n  getDefaultClinicPreferences,\n} from "@/lib/clinicLocale";\nimport { getClinicPreferences } from "@/lib/clinicPreferences";\nimport { searchPatientsPage } from "@/lib/patientDirectory";',
              ),
              (
                  'function formatMoney(value: string | number | null | undefined) {\n  return `₹${Math.max(0, Math.round(Number(value || 0))).toLocaleString("en-IN")}`;\n}\n\n',
                  '',
              ),
              (
                  '  const [saving, setSaving] = useState(false);\n  const patientRequestRef = useRef(0);',
                  '  const [saving, setSaving] = useState(false);\n  const [currencyCode, setCurrencyCode] = useState(\n    getDefaultClinicPreferences().currencyCode\n  );\n  const patientRequestRef = useRef(0);',
              ),
              (
                  '  const patientRequestRef = useRef(0);\n  const patientSearchMountedRef = useRef(false);\n\n  async function loadPatients',
                  '  const patientRequestRef = useRef(0);\n  const patientSearchMountedRef = useRef(false);\n  const formatMoney = (value: string | number | null | undefined) =>\n    formatClinicMoney(value, currencyCode);\n\n  async function loadPatients',
              ),
              (
                  '  async function loadScreenData() {\n    await Promise.all([loadPatients(patientSearch), loadDoctors()]);\n  }',
                  '  async function loadScreenData() {\n    const preferencesPromise = getClinicPreferences().catch(() =>\n      getDefaultClinicPreferences()\n    );\n    await Promise.all([loadPatients(patientSearch), loadDoctors()]);\n    setCurrencyCode((await preferencesPromise).currencyCode);\n  }',
              ),
          ]

          for old, new in replacements:
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f"Expected one match, found {count}: {old[:80]!r}")
              text = text.replace(old, new, 1)

          if "₹" in text:
              raise SystemExit("Legacy rupee symbol remains in Add Visit")

          path.write_text(text, encoding="utf-8")

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npm run typecheck

      - name: Remove one-time workflow and commit
        run: |
          rm .github/workflows/patch-visit-currency.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/app/patient/visit.tsx .github/workflows/patch-visit-currency.yml
          git commit -m "Use clinic currency in Add Visit billing"
          git push origin HEAD:main

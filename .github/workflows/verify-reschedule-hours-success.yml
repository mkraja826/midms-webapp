name: Verify reschedule clinic hours success

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/verify-reschedule-hours-success.yml

permissions:
  contents: write

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - name: Remove successful one-time workflow
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/verify-reschedule-hours-success.yml
          git commit -m "Confirm reschedule hours typecheck passed"
          git push

name: One-time dashboard Realtime test wiring

on:
  pull_request:
    branches: [main]
    paths:
      - .github/workflows/patch-dashboard-realtime-test.yml

permissions:
  contents: write

jobs:
  patch:
    if: github.event.pull_request.head.ref == 'perf-realtime-safe-2026-07-17' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout test branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Wire safe dashboard v2 and Realtime
        shell: python
        run: |
          from pathlib import Path

          def replace_once(text: str, old: str, new: str, label: str) -> str:
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f"{label}: expected one match, found {count}")
              return text.replace(old, new, 1)

          owner_path = Path("src/app/(head)/dashboard.tsx")
          owner = owner_path.read_text(encoding="utf-8")

          owner = replace_once(
              owner,
              'import { getClinicPreferences } from "@/lib/clinicPreferences";\nimport {\n  DashboardStats,\n  WorkflowDashboardSummary,\n  getDashboardStats,\n  getRoleLabel,\n  getWorkflowDashboardSummary,\n  rescheduleAppointment,\n  updateAppointmentStatus,\n} from "@/lib/supabase";',
              'import { getClinicPreferences } from "@/lib/clinicPreferences";\nimport { getClinicDashboardSafe } from "@/lib/dashboardV2";\nimport {\n  isClinicRealtimeEnabled,\n  subscribeClinicDashboardRealtime,\n} from "@/lib/realtime";\nimport {\n  DashboardStats,\n  WorkflowDashboardSummary,\n  getRoleLabel,\n  rescheduleAppointment,\n  updateAppointmentStatus,\n} from "@/lib/supabase";',
              "owner imports",
          )

          owner = replace_once(
              owner,
              '''  async function load(force = false) {
    try {
      setLoading(true);
      const [data, row, clinicPreferences] = await Promise.all([
        getDashboardStats({ force }),
        getWorkflowDashboardSummary({ force }),
        getClinicPreferences({ force }).catch(() =>
          getDefaultClinicPreferences()
        ),
      ]);

      setStats(data);
      setSummary(row);
      setCurrencyCode(clinicPreferences.currencyCode);
    } catch (error) {
      Alert.alert(
        "Dashboard load failed",
        error instanceof Error ? error.message : "Please try again."
      );
    } finally {
      setLoading(false);
    }
  }

  useEffect(() => {
    void load();
  }, []);''',
              '''  async function load(force = false, silent = false) {
    try {
      if (!silent) setLoading(true);
      const [dashboard, clinicPreferences] = await Promise.all([
        getClinicDashboardSafe({
          force,
          preferV2: isClinicRealtimeEnabled(),
        }),
        getClinicPreferences({ force }).catch(() =>
          getDefaultClinicPreferences()
        ),
      ]);

      setStats(dashboard.stats);
      setSummary(dashboard.summary);
      setCurrencyCode(clinicPreferences.currencyCode);
    } catch (error) {
      Alert.alert(
        "Dashboard load failed",
        error instanceof Error ? error.message : "Please try again."
      );
    } finally {
      if (!silent) setLoading(false);
    }
  }

  useEffect(() => {
    void load();

    return subscribeClinicDashboardRealtime({
      clinicId: profile?.clinic_id,
      onChange: () => load(true, true),
    });
  }, [profile?.clinic_id]);''',
              "owner loader",
          )

          owner_path.write_text(owner, encoding="utf-8")

          reception_path = Path("src/app/(reception)/dashboard.tsx")
          reception = reception_path.read_text(encoding="utf-8")

          reception = replace_once(
              reception,
              'import {\n  ClinicFeatureSettings,\n  DEFAULT_CLINIC_FEATURE_SETTINGS,\n  getClinicFeatureSettings,\n} from "@/lib/clinicOptions";\nimport {\n  DashboardStats,\n  getDashboardStats,\n  getRoleLabel,\n  getWorkflowDashboardSummary,\n  rescheduleAppointment,\n  supabase,\n  updateAppointmentStatus,\n} from "@/lib/supabase";',
              'import {\n  ClinicFeatureSettings,\n  DEFAULT_CLINIC_FEATURE_SETTINGS,\n  getClinicFeatureSettings,\n} from "@/lib/clinicOptions";\nimport { getClinicDashboardSafe } from "@/lib/dashboardV2";\nimport {\n  isClinicRealtimeEnabled,\n  subscribeClinicDashboardRealtime,\n} from "@/lib/realtime";\nimport {\n  DashboardStats,\n  getRoleLabel,\n  rescheduleAppointment,\n  supabase,\n  updateAppointmentStatus,\n} from "@/lib/supabase";',
              "reception imports",
          )

          reception = replace_once(
              reception,
              '''  async function load(force = false) {
    try {
      setLoading(true);

      const [data, row, featureSettings] = await Promise.all([
        getDashboardStats({ force }),
        getWorkflowDashboardSummary({ force }),
        getClinicFeatureSettings().catch((error) => {
          console.warn("Reception optional features load failed:", error);
          return DEFAULT_CLINIC_FEATURE_SETTINGS;
        }),
      ]);

      setFeatures(featureSettings);

      const { data: appointmentRows, error: appointmentError } = await supabase
        .from("appointments")
        .select("id,patient_id,appointment_time,status,patients(id,name,phone,photo_url)")
        .gte("appointment_time", startOfToday())
        .lte("appointment_time", endOfToday())
        .in("status", ["scheduled", "waiting", "checked_in", "booked"])
        .order("appointment_time", { ascending: true });

      if (!appointmentError && Array.isArray(appointmentRows)) {
        setStats({ ...data, todayAppointmentList: appointmentRows as any });
      } else {
        if (appointmentError) console.warn("Reception photo appointment query failed:", appointmentError.message);
        setStats(data);
      }

      if (row) setSummary(row);
    } catch (error) {
      Alert.alert("Dashboard load failed", error instanceof Error ? error.message : "Please try again.");
    } finally {
      setLoading(false);
    }
  }

  useEffect(() => {
    void load();
  }, []);''',
              '''  async function load(force = false, silent = false) {
    try {
      if (!silent) setLoading(true);

      const [dashboard, featureSettings] = await Promise.all([
        getClinicDashboardSafe({
          force,
          preferV2: isClinicRealtimeEnabled(),
        }),
        getClinicFeatureSettings().catch((error) => {
          console.warn("Reception optional features load failed:", error);
          return DEFAULT_CLINIC_FEATURE_SETTINGS;
        }),
      ]);

      setFeatures(featureSettings);
      let nextStats = dashboard.stats;

      // The legacy dashboard list does not include patient photos. Preserve the
      // current photo query only while the automatic fallback is active.
      if (dashboard.source === "legacy") {
        const { data: appointmentRows, error: appointmentError } = await supabase
          .from("appointments")
          .select("id,patient_id,appointment_time,status,patients(id,name,phone,photo_url)")
          .gte("appointment_time", startOfToday())
          .lte("appointment_time", endOfToday())
          .in("status", ["scheduled", "waiting", "checked_in", "booked"])
          .order("appointment_time", { ascending: true });

        if (!appointmentError && Array.isArray(appointmentRows)) {
          nextStats = {
            ...dashboard.stats,
            todayAppointmentList: appointmentRows as any,
          };
        } else if (appointmentError) {
          console.warn(
            "Reception photo appointment query failed:",
            appointmentError.message
          );
        }
      }

      setStats(nextStats);
      setSummary(dashboard.summary);
    } catch (error) {
      Alert.alert(
        "Dashboard load failed",
        error instanceof Error ? error.message : "Please try again."
      );
    } finally {
      if (!silent) setLoading(false);
    }
  }

  useEffect(() => {
    void load();

    return subscribeClinicDashboardRealtime({
      clinicId: profile?.clinic_id,
      onChange: () => load(true, true),
    });
  }, [profile?.clinic_id]);''',
              "reception loader",
          )

          reception_path.write_text(reception, encoding="utf-8")

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npm run typecheck

      - name: Remove one-time workflow and commit
        run: |
          rm .github/workflows/patch-dashboard-realtime-test.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/app/\(head\)/dashboard.tsx src/app/\(reception\)/dashboard.tsx .github/workflows/patch-dashboard-realtime-test.yml
          git commit -m "Wire dashboard v2 and Realtime with legacy fallback"
          git push origin HEAD:perf-realtime-safe-2026-07-17

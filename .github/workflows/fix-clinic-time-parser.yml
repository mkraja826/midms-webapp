name: Fix clinic time parser

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/fix-clinic-time-parser.yml

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.13.1
          cache: npm

      - name: Patch PostgreSQL time parsing
        shell: python
        run: |
          from pathlib import Path

          path = Path("src/lib/clinicLocale.ts")
          text = path.read_text(encoding="utf-8")
          old = '''  const match = raw.match(/^(\\d{1,2})(?::(\\d{2}))?\\s*(AM|PM)?$/);

          if (!match) return fallback;

          let hour = Number(match[1]);
          const minute = Number(match[2] || "0");
          const meridiem = match[3];

          if (minute < 0 || minute > 59) return fallback;'''
          new = '''  const match = raw.match(
            /^(\\d{1,2})(?::(\\d{2}))?(?::(\\d{2})(?:\\.\\d+)?)?\\s*(AM|PM)?$/
          );

          if (!match) return fallback;

          let hour = Number(match[1]);
          const minute = Number(match[2] || "0");
          const second = Number(match[3] || "0");
          const meridiem = match[4];

          if (minute < 0 || minute > 59 || second < 0 || second > 59) return fallback;'''

          if old not in text:
            raise SystemExit("Expected clinic time parser block was not found")

          path.write_text(text.replace(old, new, 1), encoding="utf-8")

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Commit fix and remove workflow
        run: |
          rm .github/workflows/fix-clinic-time-parser.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/lib/clinicLocale.ts .github/workflows/fix-clinic-time-parser.yml
          git commit -m "Fix saved clinic hours parsing"
          git push

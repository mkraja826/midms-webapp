name: Install Google login dependency

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/install-google-login-dependency.yml

permissions:
  contents: write

jobs:
  install-and-verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - uses: actions/setup-node@v4
        with:
          node-version: 22.13.1
          cache: npm
      - run: npm install
      - run: npx expo install expo-web-browser
      - run: npm run typecheck
      - name: Commit dependency and remove one-time workflow
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json
          git rm .github/workflows/install-google-login-dependency.yml
          git commit -m "Install Expo WebBrowser for Google login"
          git push

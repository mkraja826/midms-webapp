name: Normalize CapDent package lock

on:
  push:
    branches:
      - main
    paths:
      - package.json
      - package-lock.json
      - scripts/normalize-package-lock.mjs
      - .github/workflows/normalize-package-lock.yml

permissions:
  contents: write

jobs:
  normalize:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Normalize lock metadata
        run: node scripts/normalize-package-lock.mjs

      - name: Commit normalized lock file
        shell: bash
        run: |
          if git diff --quiet -- package-lock.json; then
            echo "package-lock.json is already clean."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package-lock.json
          git commit -m "Normalize CapDent package lock"
          git push

name: Web build check

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  validate-web:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck and export web app
        id: validate
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          npm run check:web 2>&1 | tee web-check.log

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: web-check-log
          path: web-check.log
          if-no-files-found: error
          retention-days: 7

      - name: Fail when validation failed
        if: steps.validate.outcome != 'success'
        run: exit 1

<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Opening MiDMS...</title>
  <link rel="stylesheet" href="../styles.css" />
</head>
<body>
  <header>
    <h1>Opening MiDMS</h1>
    <p>Password reset redirect</p>
  </header>
  <main>
    <section class="card">
      <h2>Continue in the MiDMS app</h2>
      <p>We are opening the MiDMS app so you can set a new password.</p>
      <p>If it does not open automatically, tap the button below from the phone where MiDMS is installed.</p>
      <p><a id="openApp" href="dms://auth/reset-password">Open MiDMS</a></p>
    </section>
  </main>
  <footer>© MiDMS. Contact: support@micirql.com</footer>
  <script>
    (function () {
      var target = "dms://auth/reset-password" + window.location.search + window.location.hash;
      var link = document.getElementById("openApp");
      if (link) link.href = target;
      window.location.replace(target);
    })();
  </script>
</body>
</html>
